name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00D4FF&color_dots=#0D1117,#003545,#006D8F,#00B4D8,#00D4FF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=0CFBDE&color_dots=#0D1117,#003545,#006D8F,#00B4D8,#0CFBDE

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
